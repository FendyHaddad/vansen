@if (variant() === 'bar') {
  <button
    type="button"
    class="bar-btn"
    [hlmDropdownMenuTrigger]="menu"
    align="end"
    side="top"
    aria-label="Profile menu"
  >
    <span class="bar-user">
      <span class="bar-name">
        {{ displayName() || 'Creator' }}
        <span class="tier-dot" aria-hidden="true"></span>
        <span class="tier-label">{{ tierLabel() }}</span>
      </span>
      <span class="bar-email">{{ email() }}</span>
    </span>
    <span class="bar-balance" [class.bar-balance-low]="balanceUsd() < 1">
      ${{ balanceUsd() | number: '1.2-2' }}
    </span>
  </button>
} @else {
  <button
    type="button"
    class="avatar-btn"
    [hlmDropdownMenuTrigger]="menu"
    align="end"
    aria-label="Profile menu"
  >
    {{ initial() }}
  </button>
}

<ng-template #menu>
  <div hlmDropdownMenu class="profile-dropdown">
    <div class="menu-head">
      <span class="menu-email">{{ email() }}</span>
      <span class="menu-balance">${{ balanceUsd() | number: '1.2-2' }}</span>
    </div>
    <hlm-dropdown-menu-separator />
    <button hlmDropdownMenuItem (triggered)="topUp.emit()">
      <ng-icon name="lucidePlus" size="15" />
      Top up <span class="num">$20</span>
    </button>
    <a hlmDropdownMenuItem routerLink="/app/settings">
      <ng-icon name="lucideSettings" size="15" />
      Settings
    </a>
    <hlm-dropdown-menu-separator />
    <button hlmDropdownMenuItem (triggered)="signOut.emit()">
      <ng-icon name="lucideLogOut" size="15" />
      Sign out
    </button>
  </div>
</ng-template>
