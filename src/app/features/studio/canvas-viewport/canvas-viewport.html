<div
  class="viewport"
  [class.cropping]="tool() === 'crop'"
  [class.brushing]="brushToolActive()"
  [class.pannable]="pannable()"
  [class.panning]="panning()"
  (pointerdown)="onPointerDown($event)"
  (pointermove)="onPointerMove($event)"
  (pointerup)="onPointerUp()"
  (pointerleave)="onPointerLeave()"
  (wheel)="onWheel($event)"
>
  @if (session.previewUrl(); as url) {
    <app-mask-canvas
      [imageUrl]="url"
      [enabled]="tool() === 'mask'"
      [style.transform]="stageTransform()"
    />
  }
  @if (session.previewBuffer() && imgCss(); as ic) {
    <canvas
      #previewCanvas
      class="preview-overlay"
      [style.left.px]="ic.left"
      [style.top.px]="ic.top"
      [style.width.px]="ic.width"
      [style.height.px]="ic.height"
    ></canvas>
  }
  @if (strokeTrail().length > 1) {
    <svg class="trail-svg">
      <polyline
        [attr.points]="trailPoints()"
        [attr.stroke-width]="tool() === 'heal' ? brushCursorPx() : 3"
        [class.trail-heal]="tool() === 'heal'"
        fill="none"
      />
    </svg>
  }
  @if (cropCss(); as cc) {
    <div
      class="crop-box"
      [style.left.px]="cc.left"
      [style.top.px]="cc.top"
      [style.width.px]="cc.width"
      [style.height.px]="cc.height"
      (pointerdown)="startCropDrag($event, 'move')"
    >
      <div class="crop-grid"></div>
      <span class="crop-size">{{ cropSize() }}</span>
      @for (h of handles; track h) {
        <span
          class="crop-handle handle-{{ h }}"
          (pointerdown)="startCropDrag($event, h)"
        ></span>
      }
    </div>
    <!-- pointerdown must not reach the viewport — it would redraw the crop box. -->
    <div class="crop-actions" (pointerdown)="$event.stopPropagation()">
      <button type="button" class="crop-cancel" (click)="cancelCrop()">Reset</button>
      <button type="button" class="crop-apply" (click)="applyCrop()">Apply crop</button>
    </div>
  }
  @if (brushToolActive() && cursorPos(); as cp) {
    <div
      class="brush-cursor"
      [style.left.px]="cp.x"
      [style.top.px]="cp.y"
      [style.width.px]="brushCursorPx()"
      [style.height.px]="brushCursorPx()"
    ></div>
  }
  @if (session.busy()) {
    <div class="busy-veil">Working…</div>
  }
</div>
