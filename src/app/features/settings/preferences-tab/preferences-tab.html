<div class="tab">
  <header class="tab-head">
    <h2 class="tab-title">Preferences</h2>
    <p class="muted">Defaults the workspace starts with. Saved automatically.</p>
  </header>

  <div class="panel">
    <div class="pref-item">
      <div class="pref-text">
        <label hlmLabel for="prefMode">Default mode</label>
        <p class="muted small">What the generator opens on.</p>
      </div>
      <select
        id="prefMode"
        class="pref-field pref-select"
        [value]="prefs().defaultMode"
        (change)="setMode($any($event.target).value)"
      >
        <option value="image" [selected]="prefs().defaultMode === 'image'">Image</option>
        <option value="video" [selected]="prefs().defaultMode === 'video'">Video</option>
      </select>
    </div>

    <div class="divider"></div>

    <div class="pref-item">
      <div class="pref-text">
        <label hlmLabel for="prefImage">Default image model</label>
        <p class="muted small">Pre-selected in image mode.</p>
      </div>
      <select
        id="prefImage"
        class="pref-field pref-select"
        (change)="setImageFamily($any($event.target).value)"
      >
        @for (f of imageFamilies; track f.id) {
          <option [value]="f.id" [selected]="prefs().defaultImageFamily === f.id">
            {{ f.name }}
          </option>
        }
      </select>
    </div>

    <div class="divider"></div>

    <div class="pref-item">
      <div class="pref-text">
        <label hlmLabel for="prefVideo">Default video model</label>
        <p class="muted small">Pre-selected in video mode.</p>
      </div>
      <select
        id="prefVideo"
        class="pref-field pref-select"
        (change)="setVideoFamily($any($event.target).value)"
      >
        @for (f of videoFamilies; track f.id) {
          <option [value]="f.id" [selected]="prefs().defaultVideoFamily === f.id">
            {{ f.name }}
          </option>
        }
      </select>
    </div>

    <div class="divider"></div>

    <div class="pref-item">
      <div class="pref-text">
        <label hlmLabel for="prefAspect">Default aspect ratio</label>
        <p class="muted small">Used when the model supports it.</p>
      </div>
      <select
        id="prefAspect"
        class="pref-field pref-select"
        (change)="setAspect($any($event.target).value)"
      >
        @for (ar of aspects; track ar) {
          <option [value]="ar" [selected]="prefs().defaultAspect === ar">{{ ar }}</option>
        }
      </select>
    </div>
  </div>
</div>
